<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JAN 2026 BNW Street Review – Flipbook</title>

<script src="extras/jquery.min.1.7.js"></script>
<script src="extras/jquery.mousewheel.min.js"></script>
<script src="lib/turn.min.js"></script>

<style>
body {
  background: #222;
  margin: 0;
  font-family: sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#logo {
  height: 120px;
  margin-top: 10px;
}

#title {
  font-size: 28px;
  margin: 5px 0 20px 0;
  text-align: center;
}

#flipbook {
  width: 90vw;
  max-width: 900px;
  background: #000;
}

#flipbook .page {
  background: #000;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

#flipbook img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  cursor: pointer;
}

#controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin: 15px 0;
}

#controls a, #controls button {
  color: white;
  text-decoration: none;
  background: #333;
  border: none;
  padding: 10px 18px;
  cursor: pointer;
  font-size: 16px;
}

#timeline {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 10px;
  gap: 5px;
  max-width: 90vw;
}

#timeline img {
  width: 60px;
  height: 90px;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid transparent;
}

#timeline img.active {
  border-color: #fff;
}
</style>
</head>
<body>

<img id="logo" src="logo.png" alt="Logo">
<div id="title">JAN 2026 – Black & White Street - Monthly Review</div>

<div id="flipbook"></div>

<div id="controls">
<a href="https://www.instagram.com/carter.bnw/" target="_blank">Instagram</a>
<button id="prev">Prev</button>
<button id="next">Next</button>
<a href="https://www.paypal.com/donate/?hosted_button_id=MJLDZJNTTNYCA" target="_blank">Donate / Support</a>
</div>

<div id="timeline"></div>

<script>
$(document).ready(function(){

const totalImages = 49;
const flipbook = $('#flipbook');
const timeline = $('#timeline');

for(let i=1;i<=totalImages;i++){

  const num = i.toString().padStart(4,'0');

  const page = $('<div class="page"><img src="jan26-'+num+'.jpg"></div>');
  flipbook.append(page);

  const thumb = $('<img src="jan26-'+num+'.jpg" data-page="'+i+'">');
  timeline.append(thumb);

}

flipbook.turn({
  width: flipbook.width(),
  height: flipbook.width() * (1440/1200),
  autoCenter: true,
  display: 'single',
  acceleration: true,
  gradients: true,
  elevation: 50
});

function resizeFlipbook(){

  const maxHeight = $(window).height()*0.8;
  const pageWidth = flipbook.width();
  const aspect = 1440/1200;

  const pageHeight = Math.min(maxHeight,pageWidth*aspect);

  flipbook.turn('size',pageWidth,pageHeight);
  flipbook.find('.page').css('height',pageHeight+'px');

}

resizeFlipbook();
$(window).resize(resizeFlipbook);

$('#next').click(()=>flipbook.turn('next'));
$('#prev').click(()=>flipbook.turn('previous'));

$(document).keydown(function(e){
  if(e.keyCode===37) flipbook.turn('previous');
  if(e.keyCode===39) flipbook.turn('next');
});

let startX=null;

flipbook.on('touchstart',function(e){
  startX=e.originalEvent.touches[0].clientX;
});

flipbook.on('touchmove',function(e){

  if(!startX) return;

  let diff=e.originalEvent.touches[0].clientX-startX;

  if(diff>50){
    flipbook.turn('previous');
    startX=null;
  }

  if(diff<-50){
    flipbook.turn('next');
    startX=null;
  }

});

flipbook.on('touchend',function(){
  startX=null;
});

$('#timeline img').click(function(){

  const pageNum=$(this).data('page');
  flipbook.turn('page',pageNum);

});

flipbook.bind('turned',function(e,page){

  $('#timeline img').removeClass('active');
  $('#timeline img').eq(page-1).addClass('active');

});

flipbook.turn('page',1);


/* FULLSCREEN IMAGE */

$('#flipbook').on('click','img',function(){

  const el = this;

  if(!document.fullscreenElement){

    if(el.requestFullscreen){
      el.requestFullscreen();
    } else if(el.webkitRequestFullscreen){
      el.webkitRequestFullscreen();
    } else if(el.msRequestFullscreen){
      el.msRequestFullscreen();
    }

  } else {

    if(document.exitFullscreen){
      document.exitFullscreen();
    }

  }

});

});
</script>

</body>
</html>
