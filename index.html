<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JAN 2026 BNW Street Review – Flipbook</title>

<!-- jQuery (Turn.js dependency) -->
<script src="extras/jquery.min.1.7.js"></script>
<script src="extras/jquery.mousewheel.min.js"></script>

<!-- Turn.js -->
<script src="lib/turn.min.js"></script>

<style>
body {
  background: #222; /* dark gray around pages */
  margin: 0;
  font-family: sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Logo and title */
#logo {
  height: 120px;
  margin-top: 10px;
}
#title {
  font-size: 28px;
  margin: 5px 0 20px 0;
  text-align: center;
}

/* Flipbook container */
#flipbook {
  width: 90vw;
  max-width: 1200px;
  background: #000; /* black background */
}

/* Individual pages */
#flipbook .page {
  background: #000; /* black page background */
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  margin: 0;
}

#flipbook img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* Controls */
#controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin: 15px 0;
}
#controls a, #controls button {
  color: white;
  text-decoration: none;
  background: #333;
  border: none;
  padding: 10px 18px;
  cursor: pointer;
  font-size: 16px;
}

/* Timeline thumbnails */
#timeline {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 10px;
  gap: 5px;
  max-width: 90vw;
}
#timeline img {
  width: 60px;
  height: 90px;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid transparent;
}
#timeline img.active {
  border-color: #fff;
}
</style>
</head>
<body>

<img id="logo" src="logo" alt="Logo">
<div id="title">JAN 2026 – Black & White Street - Monthly Review</div>

<div id="flipbook"></div>

<div id="controls">
  <a href="https://www.instagram.com/carter.bnw/" target="_blank">Instagram</a>
  <button id="prev">Prev</button>
  <button id="next">Next</button>
  <a href="https://www.paypal.com/donate/?hosted_button_id=MJLDZJNTTNYCA" target="_blank">Donate / Support</a>
</div>

<div id="timeline"></div>

<script>
$(document).ready(function() {
  const totalImages = 46;
  const flipbook = $('#flipbook');
  const timeline = $('#timeline');

  // Prepend a blank first page for proper left-hand first page
  flipbook.append('<div class="page"></div>');

  // Inject pages and timeline thumbnails
  for(let i = 1; i <= totalImages; i++){
    const num = i.toString().padStart(4,'0');
    const page = $(`<div class="page"><img src="jan26-${num}.jpg" alt="Page ${i}"></div>`);
    flipbook.append(page);

    const thumb = $(`<img src="jan26-${num}.jpg" data-page="${i+1}">`); // +1 due to blank page
    timeline.append(thumb);
  }

  // Append blank last page if needed to make total pages even
  const totalPages = totalImages + 1; // +1 for prepended blank
  if (totalPages % 2 === 1) {
    flipbook.append('<div class="page"></div>'); // ensures last page displays
  }

  // Initialize Turn.js
  flipbook.turn({
    width: flipbook.width(),
    height: flipbook.width() * (1440/1200),
    autoCenter: true,
    display: 'double',
    direction: 'ltr',
    acceleration: true,
    gradients: true,
    elevation: 50
  });

  // Resize function
  function resizeFlipbook() {
    const maxHeight = $(window).height() * 0.8;
    const pageWidth = flipbook.width() / 2;
    const aspect = 1440 / 1200;
    const pageHeight = Math.min(maxHeight, pageWidth * aspect);
    flipbook.turn('size', pageWidth * 2, pageHeight);
    flipbook.find('.page').css('height', pageHeight + 'px');
  }
  resizeFlipbook();
  $(window).resize(resizeFlipbook);

  // Controls
  $('#next').click(()=>flipbook.turn('next'));
  $('#prev').click(()=>flipbook.turn('previous'));
  $(document).keydown(function(e){
    if(e.keyCode === 37) flipbook.turn('previous');
    if(e.keyCode === 39) flipbook.turn('next');
  });

  // Swipe support
  let startX = null;
  flipbook.on('touchstart', function(e){ startX = e.originalEvent.touches[0].clientX; });
  flipbook.on('touchmove', function(e){
    if(!startX) return;
    let diff = e.originalEvent.touches[0].clientX - startX;
    if(diff > 50) { flipbook.turn('previous'); startX = null; }
    if(diff < -50) { flipbook.turn('next'); startX = null; }
  });
  flipbook.on('touchend', function(){ startX = null; });

  // Timeline click
  $('#timeline img').click(function(){
    const pageNum = $(this).data('page');
    flipbook.turn('page', pageNum);
  });

  // Highlight current thumbnail + handle last page centering
  flipbook.bind('turned', function(e, page) {
    $('#timeline img').removeClass('active');
    const currentThumbIndex = page - 2; // adjust for blank first page
    $('#timeline img').eq(currentThumbIndex).addClass('active');

    // Center last page if alone
    const pages = flipbook.turn('pages');
    if(pages % 2 === 1 && page === pages) {
      flipbook.find('.page').eq(page-1).css({float:'none', margin:'0 auto'});
    } else {
      flipbook.find('.page').css({float:'', margin:''});
    }
  });

  // Start on first spread (pages 1+2)
  flipbook.turn('page', 2);
});
</script>

</body>
</html>
